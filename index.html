<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGARD</title>
    <link rel="icon" href="./assets/firlogo.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="container">
        <nav>
            <div class="left-part">
                <h1>PGARD</h1>
            </div>
            <div class="middle-part">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#search-part">Search</a></li>
                    <li><a href="#">FeedBack</a></li>
                    <li><a href="#">About</a></li>
                </ul>
            </div>
        </nav>
        <div class="content">
            <div class="middle-box">
                <div class="text-part">
                    <h2>Explore the Depths of Data: Insights from India's Census.</h2>
                </div>
                <img src="https://miro.medium.com/v2/resize:fit:1400/format:webp/1*1mpja--M9u8NMZxGG5izBA.png" alt="">
            </div>
        </div>
        <div id="search-part" class="search-part">
            <div class="search-container">
                <div class="search">
                    <i class="fa fa-search"></i>
                    <input type="text" placeholder="Search...">
                    <button>Search</button>
                </div>
                <div class="check-boxs">
                    <div class="check-box">
                        <input type="checkbox" name="check" id="hospital">
                        <label for="hospital">Hospital</label>
                    </div>
                    <div class="check-box">
                        <input type="checkbox" name="check" id="school">
                        <label for="school">School</label>
                    </div>
                    <div class="check-box">
                        <input type="checkbox" name="check" id="population">
                        <label for="population">Population</label>
                    </div>
                    <div class="check-box">
                        <input type="checkbox" name="check" id="economical-growth">
                        <label for="economical-growth">Economical Growth</label>
                    </div>
                </div>
                <div class="year-dropdown">
                    <label for="year">Year:</label>
                    <select name="year" id="year">
                        <option value="2000">2000</option>
                        <option value="2001">2001</option>
                        <option value="2002">2002</option>
                        <option value="2003">2003</option>
                        <option value="2004">2004</option>
                        <option value="2005">2005</option>
                        <option value="2006">2006</option>
                        <option value="2007">2007</option>
                        <option value="2008">2008</option>
                        <option value="2009">2009</option>
                        <option value="2010">2010</option>
                        <option value="2011">2011</option>
                        <option value="2012">2012</option>
                        <option value="2013">2013</option>
                        <option value="2014">2014</option>
                        <option value="2015">2015</option>
                        <option value="2016">2016</option>
                        <option value="2017">2017</option>
                        <option value="2018">2018</option>
                        <option value="2019">2019</option>
                        <option value="2020">2020</option>
                        <option value="2021">2021</option>
                        <option value="2022">2022</option>
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                    </select>
                </div>
            </div>
            <div class="search-content">
                <!-- javascript goes here -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
